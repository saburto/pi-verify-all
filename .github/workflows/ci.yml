name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ["22"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: npm ci

      - name: Install peer dependency (for TypeScript check)
        run: npm install --no-save @earendil-works/pi-coding-agent

      - name: TypeScript check
        run: npx tsc --noEmit --project tsconfig.verify.json

      - name: Run tests
        run: npx vitest run
